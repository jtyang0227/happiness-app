name: CI/CD — Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ────────────────────────────────────────────────────────────────────
  # 1. Backend — 빌드 + 테스트
  # ────────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      # Java 21로 Gradle 실행. build.gradle toolchain=25 이므로
      # Gradle이 Adoptium에서 JDK 25를 자동 다운로드(auto-provision)함.
      - name: Set up Java 21 (Gradle host JVM)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build JAR
        run: ./gradlew bootJar -x test --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/app.jar
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────
  # 2. Frontend — 빌드
  # ────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build (production)
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
        run: npm run build

      - run: npm test -- --watchAll=false --passWithNoTests

  # ────────────────────────────────────────────────────────────────────
  # 3. Docker — 이미지 빌드 & GHCR Push (master 브랜치만)
  #
  # Dockerfile.prod 사용: backend-ci 에서 만든 JAR을 그대로 복사.
  # Docker 내부에서 Gradle을 다시 실행하지 않으므로 Java 툴체인 충돌 없음.
  # ────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # backend-ci 가 업로드한 JAR을 Dockerfile.prod COPY 경로에 맞게 배치
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod   # ← 미리 빌드된 JAR 사용
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────
  # 4. Deploy Backend → Railway (master 브랜치만)
  # ────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Check Railway token
        id: railway-check
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::RAILWAY_TOKEN secret이 설정되지 않았습니다. 배포를 건너뜁니다."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Railway CLI
        if: steps.railway-check.outputs.configured == 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.railway-check.outputs.configured == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend --detach

  # ────────────────────────────────────────────────────────────────────
  # 5. Deploy Frontend → Vercel (master 브랜치만)
  #
  # VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID 시크릿이 모두
  # 설정된 경우에만 배포 실행. 미설정 시 경고 후 건너뜀.
  # ────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: frontend-ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: vercel-check
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::Vercel secrets(VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID)가 설정되지 않았습니다. 배포를 건너뜁니다."
            echo "::warning::GitHub → Settings → Secrets → Actions 에서 등록하세요."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.vercel-check.outputs.configured == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.vercel-check.outputs.configured == 'true'
        run: npm ci
        working-directory: frontend

      - name: Deploy to Vercel
        if: steps.vercel-check.outputs.configured == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
