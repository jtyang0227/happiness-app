<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해피니스 모바일 앱 - Hello World 테스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .api-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .api-section h2 {
            color: #667eea;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        .api-url {
            background: white;
            border-left: 4px solid #667eea;
            padding: 10px 15px;
            margin-bottom: 15px;
            font-family: monospace;
            color: #333;
            border-radius: 4px;
        }
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            font-weight: bold;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .button:active {
            transform: translateY(0);
        }
        .response {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #28a745;
            display: none;
        }
        .response.show {
            display: block;
        }
        .response h3 {
            color: #28a745;
            margin-bottom: 10px;
        }
        .response-content {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            color: #333;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }
        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }
        .error {
            border-left-color: #dc3545;
        }
        .error h3 {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 해피니스 모바일 앱</h1>
        <p class="subtitle">프론트엔드 - Hello World 테스트</p>
        
        <div class="api-section">
            <h2>백엔드 API 테스트</h2>
            <div class="api-url">GET http://localhost:8080/api/hello</div>
            <button class="button" onclick="fetchHello()">백엔드 메시지 요청</button>
        </div>
        
        <div id="response" class="response">
            <h3>응답 결과:</h3>
            <div class="response-content" id="responseContent"></div>
        </div>
    </div>

    <script>
        function fetchHello() {
            const responseDiv = document.getElementById('response');
            const responseContent = document.getElementById('responseContent');
            
            responseDiv.classList.add('show');
            responseContent.textContent = '로딩 중...';
            responseDiv.classList.remove('error');
            
            fetch('http://localhost:8080/api/hello')
                .then(response => response.json())
                .then(data => {
                    responseContent.textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    responseDiv.classList.add('error');
                    responseContent.textContent = '오류: ' + error.message + '\n\n백엔드가 실행 중인지 확인하세요.';
                });
        }
        
        // 페이지 로드 시 자동으로 테스트
        window.addEventListener('load', () => {
            console.log('모바일 앱 프론트엔드 로드 완료');
        });
    </script>
</body>
</html>
