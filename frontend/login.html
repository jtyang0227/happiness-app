<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해피니스 모바일 앱 - 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px 30px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            color: #666;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: normal;
        }
        
        .button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .oauth-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .oauth-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .oauth-btn:hover {
            border-color: #667eea;
            background: #f5f5f5;
        }
        
        .oauth-btn.google {
            color: #c33;
        }
        
        .oauth-btn.naver {
            color: #00d000;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 0.9rem;
        }
        
        .divider::before {
            content: '';
            display: block;
            height: 1px;
            background: #e0e0e0;
            margin-bottom: 10px;
        }
        
        .divider::after {
            content: '';
            display: block;
            height: 1px;
            background: #e0e0e0;
            margin-top: 10px;
        }
        
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .help-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 해피니스</h1>
            <p>모바일 앱에 로그인하세요</p>
        </div>
        
        <div class="content">
            <div id="message"></div>
            
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('login')">로그인</button>
                <button class="tab-button" onclick="switchTab('signup')">회원가입</button>
            </div>
            
            <!-- 로그인 폼 -->
            <div id="login" class="form-section active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">이메일</label>
                        <input type="email" id="login-email" placeholder="example@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">비밀번호</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="button">로그인</button>
                </form>
                
                <div class="divider">또는</div>
                
                <div class="oauth-buttons">
                    <button class="oauth-btn google" onclick="handleGoogleOAuth()">🔷 Google</button>
                    <button class="oauth-btn naver" onclick="handleNaverOAuth()">🟩 Naver</button>
                </div>
            </div>
            
            <!-- 회원가입 폼 -->
            <div id="signup" class="form-section">
                <form onsubmit="handleSignUp(event)">
                    <div class="form-group">
                        <label for="signup-email">이메일</label>
                        <input type="email" id="signup-email" placeholder="example@email.com" required>
                        <div class="help-text">가입에 사용될 이메일입니다</div>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-name">이름</label>
                        <input type="text" id="signup-name" placeholder="홍길동" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-tel">전화번호</label>
                        <input type="tel" id="signup-tel" placeholder="010-1234-5678" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-password">비밀번호</label>
                        <input type="password" id="signup-password" placeholder="••••••••" required>
                        <div class="help-text">최소 8자 이상, 특수문자 포함 권장</div>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-password-confirm">비밀번호 확인</label>
                        <input type="password" id="signup-password-confirm" placeholder="••••••••" required>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="terms-agree" required>
                        <label for="terms-agree">
                            <strong>서비스 약관에 동의합니다</strong>
                            <a href="#" onclick="event.preventDefault(); showTerms()">보기</a>
                        </label>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="privacy-agree" required>
                        <label for="privacy-agree">
                            <strong>개인정보 처리방침에 동의합니다</strong>
                            <a href="#" onclick="event.preventDefault(); showPrivacy()">보기</a>
                        </label>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="marketing-agree">
                        <label for="marketing-agree">마케팅 정보 수신에 동의합니다 (선택)</label>
                    </div>
                    
                    <button type="submit" class="button">회원가입</button>
                </form>
                
                <div class="divider">또는 소셜로 가입</div>
                
                <div class="oauth-buttons">
                    <button class="oauth-btn google" onclick="handleGoogleOAuth()">🔷 Google</button>
                    <button class="oauth-btn naver" onclick="handleNaverOAuth()">🟩 Naver</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/auth';
        
        function switchTab(tab) {
            document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
        
        function showMessage(message, type = 'info') {
            const messageEl = document.getElementById('message');
            messageEl.className = `message ${type}`;
            messageEl.textContent = message;
        }
        
        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    showMessage(`✅ ${data.message} - ${data.data.name}님 환영합니다!`, 'success');
                    console.log('로그인 정보:', data.data);
                    localStorage.setItem('user', JSON.stringify(data.data));
                    setTimeout(() => {
                        location.href = '/dashboard.html';
                    }, 2000);
                } else {
                    showMessage(`❌ ${data.message}`, 'error');
                }
            })
            .catch(err => {
                showMessage(`❌ 오류: ${err.message}`, 'error');
                console.error(err);
            });
        }
        
        function handleSignUp(e) {
            e.preventDefault();
            
            const password = document.getElementById('signup-password').value;
            const passwordConfirm = document.getElementById('signup-password-confirm').value;
            
            if (password !== passwordConfirm) {
                showMessage('❌ 비밀번호가 일치하지 않습니다', 'error');
                return;
            }
            
            const data = {
                email: document.getElementById('signup-email').value,
                password: password,
                name: document.getElementById('signup-name').value,
                tel: document.getElementById('signup-tel').value,
                termsAgreed: document.getElementById('terms-agree').checked,
                privacyAgreed: document.getElementById('privacy-agree').checked,
                marketingAgreed: document.getElementById('marketing-agree').checked
            };
            
            fetch(`${API_URL}/signup`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(response => {
                if (response.status === 'success') {
                    showMessage(`✅ ${response.message} 로그인 페이지로 이동합니다...`, 'success');
                    console.log('가입 정보:', response.data);
                    setTimeout(() => {
                        document.querySelector('form').reset();
                        switchTab('login');
                        location.reload();
                    }, 2000);
                } else {
                    showMessage(`❌ ${response.message}`, 'error');
                }
            })
            .catch(err => {
                showMessage(`❌ 오류: ${err.message}`, 'error');
                console.error(err);
            });
        }
        
        function handleGoogleOAuth() {
            showMessage('ℹ️ Google OAuth2 로그인 준비 중입니다...', 'info');
            // 실제 Google OAuth2 구현 필요
            console.log('Google OAuth2 클릭됨');
        }
        
        function handleNaverOAuth() {
            showMessage('ℹ️ Naver OAuth2 로그인 준비 중입니다...', 'info');
            // 실제 Naver OAuth2 구현 필요
            console.log('Naver OAuth2 클릭됨');
        }
        
        function showTerms() {
            showMessage('📋 서비스 약관: [약관 내용은 여기에 표시됩니다]', 'info');
        }
        
        function showPrivacy() {
            showMessage('🔒 개인정보 처리방침: [개인정보 처리방침 내용은 여기에 표시됩니다]', 'info');
        }
    </script>
</body>
</html>
