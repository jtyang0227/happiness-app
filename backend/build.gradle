plugins {
    id 'java'
}

group = 'com.happiness'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-autoconfigure:3.4.5'
    implementation 'org.springframework.boot:spring-boot:3.4.5'
    implementation 'org.springframework:spring-web:6.2.6'
    implementation 'org.springframework:spring-webmvc:6.2.6'
    implementation 'org.springframework:spring-context:6.2.6'
    implementation 'org.springframework.data:spring-data-jpa:3.4.5'
    implementation 'org.springframework:spring-tx:6.2.6'
    implementation 'jakarta.persistence:jakarta.persistence-api:3.2.0'
    implementation 'org.springframework.security:spring-security-core:6.4.5'
    implementation 'org.springframework.security:spring-security-web:6.4.5'
    implementation 'org.springframework.security:spring-security-config:6.4.5'
    implementation 'com.h2database:h2:2.2.220'
    implementation 'org.projectlombok:lombok:1.18.46'
    implementation 'net.coobird:thumbnailator:0.4.20'
    implementation 'commons-io:commons-io:2.11.0'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.3'

    annotationProcessor 'org.projectlombok:lombok:1.18.46'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}
