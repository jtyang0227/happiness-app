spring:
  datasource:
    url: ${DATABASE_URL}           # postgresql://user:pass@host:5432/db
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate              # 운영에서는 절대 create/create-drop 금지
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  h2:
    console:
      enabled: false
  data:
    redis:
      url: ${REDIS_URL}              # redis://default:token@host:port
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

server:
  # Railway/Render는 PORT 환경변수 자동 주입
  port: ${PORT:8080}
  tomcat:
    # 운영 커넥션 튜닝
    max-threads: 200
    accept-count: 100
  # HTTPS 리다이렉트는 Cloudflare에서 처리하므로 앱 레벨 불필요
  # forward-headers-strategy: NATIVE  # 프록시 헤더 신뢰

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}   # https://app.example.com

logging:
  level:
    root: WARN
    com.happiness: INFO
  pattern:
    # Logstash JSON 포맷 (Railway 로그 수집용)
    console: '{"time":"%d{ISO8601}","level":"%level","trace":"%X{traceId}","logger":"%logger{36}","msg":"%msg"}%n'

management:
  endpoint:
    health:
      show-details: never
