spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      data-source-properties:
        sslmode: require
        sslfactory: org.postgresql.ssl.NonValidatingFactory
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  h2:
    console:
      enabled: false
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 200
    accept-count: 100

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://happiness.io.kr,https://www.happiness.io.kr}

logging:
  level:
    root: WARN
    com.happiness: INFO
  pattern:
    console: '{"time":"%d{ISO8601}","level":"%level","trace":"%X{traceId}","logger":"%logger{36}","msg":"%msg"}%n'

management:
  endpoint:
    health:
      show-details: never
