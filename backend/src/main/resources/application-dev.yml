spring:
  datasource:
    url: jdbc:h2:mem:happinessdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  # 개발용 Redis (로컬 Docker 또는 없으면 비활성)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:19006,http://localhost:8081"

logging:
  level:
    root: INFO
    com.happiness: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
