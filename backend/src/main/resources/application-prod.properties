# ===============================================
# 모바일앱 백엔드 - 프로덕션 환경 설정
# ===============================================
# 이 파일은 프로덕션 배포 시 사용됩니다
# 환경 변수: SPRING_PROFILES_ACTIVE=prod

# 서버 설정
server.port=8080
server.servlet.context-path=/api

# 데이터베이스 (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/happiness_prod
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA 설정
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# 로깅
logging.level.root=INFO
logging.level.com.happiness=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=DEBUG

# CORS 설정
cors.allowed-origins=${CORS_ORIGINS:https://happiness.dev,https://www.happiness.dev}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.max-age=3600

# JWT 토큰 (향후 구현)
jwt.secret=${JWT_SECRET:your-secret-key-change-this}
jwt.expiration=${JWT_EXPIRATION:86400}

# OAuth2 설정 (향후 구현)
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
naver.client-id=${NAVER_CLIENT_ID:}
naver.client-secret=${NAVER_CLIENT_SECRET:}

# S3 설정 (향후 구현)
aws.s3.bucket=${AWS_S3_BUCKET:happiness-builds}
aws.s3.region=${AWS_REGION:ap-northeast-2}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}

# 메일 설정 (향후 구현)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# 트래킹/모니터링
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
